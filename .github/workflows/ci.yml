name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python via uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Sync deps
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy etl/ || true  # warn-only no início

      - name: Pytest
        run: uv run pytest -v
