name: Refresh diagnostic data

on:
  schedule:
    # 1º dia útil de jan/abr/jul/out, 06:00 UTC = 03:00 BRT
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      uf:
        description: 'UF específica (vazio = todos os 27)'
        required: false
        type: string
        default: ''
      skip_pr:
        description: 'Skip cross-repo PR (só artifact)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python via uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          python-version: "3.12"

      - name: Sync deps
        run: uv sync

      - name: Auth GCP
        uses: google-github-actions/auth@7b53cdc2a387814ed14eec026287aac689ae8c9b # v2.1.9
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run ETL build
        env:
          GCP_BILLING_PROJECT: ${{ secrets.GCP_BILLING_PROJECT }}
        run: |
          if [ -n "${{ inputs.uf }}" ]; then
            uv run python -m etl.build --uf "${{ inputs.uf }}"
          else
            uv run python -m etl.build
          fi

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-output
          path: output/
          retention-days: 7

      - name: Set branch name
        id: branch
        run: |
          QUARTER=$(date +%Y-Q$((($(date +%m)-1)/3+1)))
          echo "name=data-${QUARTER}" >> $GITHUB_OUTPUT

      - name: Create PR with refreshed output
        if: ${{ !inputs.skip_pr }}
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): refresh trimestral ${{ steps.branch.outputs.name }}"
          branch: ${{ steps.branch.outputs.name }}
          title: "chore(data): refresh trimestral ${{ steps.branch.outputs.name }}"
          body: |
            Refresh automático trimestral dos dados.

            - 27 diagnostico/<UF>.json atualizados
            - benchmark.json + metadata.json atualizados
            - vintage de cada fonte registrada nos JSONs

            CI verde indica que schema valida e cada UF tem 14 indicadores.

            Após merge nesse repo, workflow `pr-to-site` abre PR cross-repo em scintilla-site-v2.
          add-paths: output/
