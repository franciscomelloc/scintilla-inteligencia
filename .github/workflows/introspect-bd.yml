name: Introspect BD schemas

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  introspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python via uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          python-version: "3.12"

      - name: Sync deps
        run: uv sync

      - name: Auth GCP
        uses: google-github-actions/auth@7b53cdc2a387814ed14eec026287aac689ae8c9b # v2.1.9
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run introspection
        env:
          GCP_BILLING_PROJECT: ${{ secrets.GCP_BILLING_PROJECT }}
        run: uv run python etl/introspect.py

      - name: Upload schema report
        uses: actions/upload-artifact@v4
        with:
          name: bd-schema-report
          path: output/bd_schema_report.json
          retention-days: 7
