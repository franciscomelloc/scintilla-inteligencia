name: Diagnose BD column values

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
      - run: uv sync
      - uses: google-github-actions/auth@7b53cdc2a387814ed14eec026287aac689ae8c9b # v2.1.9
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - env:
          GCP_BILLING_PROJECT: ${{ secrets.GCP_BILLING_PROJECT }}
        run: uv run python -m etl.diagnose
      - uses: actions/upload-artifact@v4
        with:
          name: diagnose-report
          path: output/diagnose_report.json
          retention-days: 7
